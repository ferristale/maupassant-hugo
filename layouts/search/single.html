{{ define "content"}}
<div class="res-cons"
     data-feed-url="{{ "index.xml" | absURL }}"
     data-continue-reading="{{ i18n "continueReading" }}">
    <h3 class="archive-title">
        {{ i18n "Search" }}
        <span class="keyword"></span>
        {{ i18n "Search_results" }}
    </h3>
    <div id="search-results"></div>
</div>

<script>
(() => {
    const root = document.querySelector('.res-cons');
    const results = document.getElementById('search-results');
    const q = (new URLSearchParams(location.search).get('q') || '').trim();
    root.querySelector('.keyword').textContent = q;
    if (!q) return;

    const { feedUrl, continueReading } = root.dataset;

    fetch(feedUrl).then(r => r.text()).then(text => {
        const doc = new DOMParser().parseFromString(text, 'application/xml');
        const needle = q.toLowerCase();
        const html = [...doc.querySelectorAll('item')].map(item => {
            const get = tag => item.querySelector(tag)?.textContent || '';
            const title = get('title'), desc = get('description');
            if (!title.toLowerCase().includes(needle) && !desc.toLowerCase().includes(needle)) return '';
            const url = get('link');
            const d = new Date(get('pubDate'));
            return `<article class="post">
                <header><h1 class="post-title"><a href="${url}">${title}</a></h1></header>
                <time class="post-meta meta-date">${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}</time>
                <div class="post-content">${desc}……<p class="readmore"><a href="${url}">${continueReading}</a></p></div>
            </article>`;
        }).join('');
        results.innerHTML = html || '<p class="post-content">……</p>';
    });
})();
</script>
{{ end }}
