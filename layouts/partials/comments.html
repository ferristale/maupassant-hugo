{{ if and .IsPage (ne .Params.comment false) }}
    {{ template "_internal/disqus.html" . }}

    <!-- utteranc -->
    {{ if .Site.Params.utteranc.enable }}
    <div class="post bg-white">
      <script>
        // Determine the correct theme before loading utterances
        (function() {
          // Get current theme
          const currentTheme = document.documentElement.getAttribute('data-theme');
          const systemPrefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          
          // Determine if we should use dark theme
          const shouldUseDarkTheme = currentTheme === 'dark' || 
                                   (currentTheme !== 'light' && systemPrefersDark);
          
          const utterancesTheme = shouldUseDarkTheme ? 'github-dark' : 'github-light';
          
          // Create and load the utterances script with the correct theme
          const script = document.createElement('script');
          script.src = 'https://utteranc.es/client.js';
          script.setAttribute('repo', '{{ .Site.Params.utteranc.repo }}');
          script.setAttribute('issue-term', '{{ .Site.Params.utteranc.issueTerm }}');
          script.setAttribute('theme', utterancesTheme);
          script.setAttribute('crossorigin', 'anonymous');
          script.setAttribute('async', '');
          
          // Insert the script into the DOM
          const container = document.currentScript.parentNode;
          container.insertBefore(script, document.currentScript);
        })();
      </script>
      <script>
        // Function to update Utterances theme when it changes
        function updateUtterancesTheme() {
          const currentTheme = document.documentElement.getAttribute('data-theme');
          const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          
          // Determine if we should use dark theme
          const shouldUseDarkTheme = currentTheme === 'dark' || 
                                   (currentTheme !== 'light' && systemPrefersDark);
          
          const utterancesTheme = shouldUseDarkTheme ? 'github-dark' : 'github-light';
          
          // Find the utterances iframe
          const utterancesFrame = document.querySelector('.utterances-frame');
          if (utterancesFrame) {
            const message = {
              type: 'set-theme',
              theme: utterancesTheme
            };
            utterancesFrame.contentWindow.postMessage(message, 'https://utteranc.es');
          }
        }
        
        // Listen for theme changes
        const observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'data-theme') {
              setTimeout(updateUtterancesTheme, 100);
            }
          });
        });
        
        observer.observe(document.documentElement, {
          attributes: true,
          attributeFilter: ['data-theme']
        });
        
        // Listen for system theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
          setTimeout(updateUtterancesTheme, 100);
        });
      </script>
    </div>
    {{ end }}
    <!--waline-->
    {{ if .Site.Params.waline.enable }}
    <div id="waline"></div>
    <script src="//cdn.jsdelivr.net/npm/@waline/client"></script>
    <script>
        Waline({
            el: '#waline',
            serverURL: '{{ .Site.Params.waline.serverURL }}',
            placeholder: '{{ .Site.Params.waline.placeholder }}',
        });
    </script>
    {{ end }}
{{- end }}
