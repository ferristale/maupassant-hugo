<header id="header" class="clearfix">
    <div class="container">
        <div class="col-group">
            <div class="site-name ">
                {{ if .IsHome }}
                    <h1>
                        <a id="logo" href="{{ .Site.BaseURL | relURL }}">
                            {{ .Site.Title }}
                        </a>
                    </h1>
                {{ else }}
                    <a id="logo" href="{{ .Site.BaseURL | relURL }}">
                        {{ .Site.Title }}
                    </a>
                {{ end }}
                {{ with .Site.Params.subtitle }}<p class="description">{{ . }}</p>{{ end }}
            </div>
            <div>
                <div id="theme-toggle-container"></div>
                <nav id="nav-menu" class="clearfix">
                    <a class="{{ if .IsHome }}current{{ end }}" href="{{ .Site.BaseURL | relURL }}">{{ i18n "home" }}</a>
                    {{ range .Site.Menus.main }}
                    <a {{ if or (eq .URL $.RelPermalink) (eq .URL $.Permalink) (and (eq $.Kind "page") (eq $.Type "page") (eq .Name $.Title)) }}class="current"{{ end }} href="{{ .URL | relURL }}" title="{{ .Name }}">{{ .Name }}</a>
                    {{ end }}
                </nav>
            </div>
        </div>
    </div>
</header>
