{{ if and (or .Params.toc (and .Site.Params.toc (ne .Params.toc false))) .TableOfContents -}}
<style type="text/css">
    .post-toc {
        margin: 1.5em 0;
        padding: 0.6em 1em;
        border: 1px solid var(--theme-border);
        border-radius: 4px;
        background-color: var(--theme-secondary-bg);
        font-size: 0.95em;
    }
    .post-toc-title {
        cursor: pointer;
        font-weight: 600;
        color: var(--theme-muted-color);
        list-style-position: inside;
    }
    .post-toc[open] .post-toc-title {
        margin-bottom: 0.4em;
    }
    .post-toc-content ul {
        padding-left: 1.4em;
        margin: 0.3em 0;
        line-height: 1.7;
    }
    .post-toc-content > nav > ul {
        padding-left: 1.2em;
    }
</style>
<details class="post-toc" open>
    <summary class="post-toc-title">{{ i18n "toc" }}</summary>
    <div class="post-toc-content">
        {{ .TableOfContents }}
    </div>
</details>
{{- end }}
